<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container-principal">
            <h1>Calculadora de idade</h1>
            <div class="container-secundario">
                <label for="aniversario">Coloque sua data de aniversário</label>
                <input type="date" id="aniversario" name="aniversario"><br>
                <button class="botao" id="botao">Calculadora idade</button>
            </div>
            <p id="resultado" class="resultado"></p>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
